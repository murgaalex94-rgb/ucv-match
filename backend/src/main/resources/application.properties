# Configuración del servidor
server.port=${PORT:8080}

# Configuración de Base de Datos (H2 por defecto, PostgreSQL si se definen SPRING_DATASOURCE_*)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:ucvmatch;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# Configuración JWT
jwt.secret=${JWT_SECRET:ucv_match_secret_key_2024_seguridad_jwt_token_32chars}
jwt.expiration=86400000

# Configuración Stream Chat
stream.api.key=${STREAM_API_KEY:}
stream.api.secret=${STREAM_API_SECRET:}

spring.jackson.serialization.fail-on-empty-beans=false

# Configuración de logging
logging.level.org.springframework.security=DEBUG
logging.level.com.ucvmatch=DEBUG
